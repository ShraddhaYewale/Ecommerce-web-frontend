<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - ShopNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .cart-img { width: 90px; height: 90px; object-fit: contain; background: white; padding: 5px; border: 1px solid #dee2e6; border-radius: 6px; }
    .quantity-input { width: 60px; }
  </style>
</head>
<body>

<!-- Navbar (same) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <div class="container">
    <a class="navbar-brand" href="index.html">ShopNow</a>
    <!-- ... rest same as above ... -->
  </div>
</nav>

<div class="container py-5">
  <h2 class="mb-4">Your Shopping Cart</h2>

  <div class="row">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cartItemsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <a href="shop.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i> Continue Shopping</a>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Order Summary</h5>
          <hr>
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal (<span id="itemCount">0</span> items)</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Shipping</span>
            <span id="shipping">₹0</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Estimated Tax (18% GST)</span>
            <span id="tax">₹0</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total</span>
            <span id="grandTotal">₹0</span>
          </div>
          <button class="btn btn-primary w-100 mt-4 py-3 fw-bold">PROCEED TO CHECKOUT</button>
          <p class="text-muted text-center mt-3 small">Secure checkout powered by Razorpay / PayU</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer (same) -->
<footer class="py-5">
  <!-- ... same as before ... -->
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

<script>
// Enhanced cart logic with quantity
function renderCart() {
  const tbody = document.getElementById('cartItemsBody');
  tbody.innerHTML = '';
  let subtotal = 0;
  let itemCount = 0;

  cart.forEach((item, index) => {
    const qty = item.quantity || 1;
    const itemTotal = item.price * qty;
    subtotal += itemTotal;
    itemCount += qty;

    tbody.innerHTML += `
      <tr>
        <td>
          <div class="d-flex align-items-center">
            <img src="${item.image}" class="cart-img me-3" alt="${item.name}">
            <div>
              <div class="fw-bold">${item.name}</div>
              <small class="text-muted">Sold by ShopNow</small>
            </div>
          </div>
        </td>
        <td>₹${item.price.toLocaleString('en-IN')}</td>
        <td>
          <div class="input-group input-group-sm w-100" style="max-width:120px;">
            <button class="btn btn-outline-secondary decrease-qty" data-index="${index}">-</button>
            <input type="number" class="form-control quantity-input text-center" value="${qty}" min="1" readonly>
            <button class="btn btn-outline-secondary increase-qty" data-index="${index}">+</button>
          </div>
        </td>
        <td class="fw-bold">₹${itemTotal.toLocaleString('en-IN')}</td>
        <td>
          <button class="btn btn-sm btn-danger remove-item" data-index="${index}">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
    `;
  });

  if (cart.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 fs-5">Your cart is empty.<br><a href="shop.html" class="btn btn-outline-primary mt-3">Start Shopping</a></td></tr>`;
  }

  const shipping = subtotal > 0 ? (subtotal > 10000 ? 0 : 149) : 0;
  const tax = Math.round(subtotal * 0.18);
  const total = subtotal + shipping + tax;

  document.getElementById('itemCount').textContent = itemCount;
  document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString('en-IN')}`;
  document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : `₹${shipping}`;
  document.getElementById('tax').textContent = `₹${tax.toLocaleString('en-IN')}`;
  document.getElementById('grandTotal').textContent = `₹${total.toLocaleString('en-IN')}`;
}

document.addEventListener('click', e => {
  const target = e.target;

  if (target.classList.contains('remove-item')) {
    const index = parseInt(target.dataset.index);
    cart.splice(index, 1);
    saveCart();
    updateCartCount();
    renderCart();
  }

  if (target.classList.contains('increase-qty')) {
    const index = parseInt(target.dataset.index);
    cart[index].quantity = (cart[index].quantity || 1) + 1;
    saveCart();
    updateCartCount();
    renderCart();
  }

  if (target.classList.contains('decrease-qty')) {
    const index = parseInt(target.dataset.index);
    if ((cart[index].quantity || 1) > 1) {
      cart[index].quantity = (cart[index].quantity || 1) - 1;
      saveCart();
      updateCartCount();
      renderCart();
    }
  }
});

// Load cart on page open
renderCart();
updateCartCount();  // from main.js
</script>

</body>
</html>
