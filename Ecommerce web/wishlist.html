<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - ShopNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Navbar + Sidebar same as above -->

<div class="container py-5">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-lg-3 mb-4">
      <!-- ... same sidebar, active on Wishlist ... -->
    </div>

    <div class="col-lg-9">
      <h3 class="mb-4">My Wishlist <span class="text-muted fs-6">(12 items)</span></h3>

      <div class="row g-4" id="wishlistGrid">
        <!-- Example item -->
        <div class="col-md-4 col-sm-6">
          <div class="card h-100 border-0 shadow-sm position-relative">
            <span class="position-absolute top-0 end-0 m-2">
              <button class="btn btn-sm btn-danger rounded-circle"><i class="fas fa-trash"></i></button>
            </span>
            <img src="https://images.unsplash.com/photo-1605640840605-14ac1855827b?w=500" class="card-img-top product-img" alt="Product">
            <div class="card-body d-flex flex-column">
              <h6 class="card-title">Wireless Earbuds Pro</h6>
              <p class="text-primary fw-bold mb-3">₹3,499</p>
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary add-to-cart" data-id="1" data-name="Wireless Earbuds Pro" data-price="3499" data-image="...">Add to Cart</button>
                <button class="btn btn-outline-secondary">Move to Cart</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Repeat more wishlist items ... -->
      </div>

      <div class="text-center mt-5" id="emptyWishlist" style="display:none;">
        <i class="far fa-heart fa-4x text-muted mb-3"></i>
        <h5>Your wishlist is empty</h5>
        <a href="shop.html" class="btn btn-primary mt-3">Start Adding Items</a>
      </div>
    </div>
  </div>
</div>

<!-- Footer + scripts same -->

</body>
</html>
