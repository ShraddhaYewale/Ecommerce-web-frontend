<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Navbar (same as profile.html) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <!-- ... copy navbar ... -->
</nav>

<div class="container py-5">
  <div class="row">
    <!-- Sidebar (same as profile.html) -->
    <div class="col-lg-3 mb-4">
      <div class="profile-sidebar p-4 rounded shadow-sm">
        <!-- ... copy the sidebar from profile.html ... -->
        <ul class="nav flex-column account-nav">
          <li class="nav-item"><a class="nav-link" href="profile.html"><i class="fas fa-home me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="orders.html"><i class="fas fa-shopping-bag me-2"></i>Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="wishlist.html"><i class="fas fa-heart me-2"></i>Wishlist</a></li>
          <li class="nav-item"><a class="nav-link" href="settings.html"><i class="fas fa-cog me-2"></i>Settings</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
        </ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="col-lg-9">
      <h3 class="mb-4">My Orders</h3>

      <!-- Filters -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select class="form-select">
                <option>All Orders</option>
                <option>Delivered</option>
                <option>Processing</option>
                <option>Cancelled</option>
                <option>Returned</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Date Range</label>
              <select class="form-select">
                <option>Last 30 days</option>
                <option>Last 3 months</option>
                <option>Last 6 months</option>
                <option>Year 2025</option>
                <option>Year 2026</option>
                <option>All Time</option>
              </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button class="btn btn-primary w-100">Filter</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Orders List -->
      <div id="ordersList">
        <!-- Example order card – repeat with real data later -->
        <div class="card border-0 shadow-sm mb-4 order-card">
          <div class="card-header bg-white d-flex justify-content-between">
            <div>
              <strong>Order #ORD-784512</strong><br>
              <small class="text-muted">Placed on Feb 18, 2026</small>
            </div>
            <span class="badge bg-success align-self-center">Delivered</span>
          </div>
          <div class="card-body">
            <div class="d-flex align-items-center">
              <img src="https://images.unsplash.com/photo-1605640840605-14ac1855827b?w=100" class="me-3" style="width:80px; height:80px; object-fit:contain;">
              <div>
                <div>Wireless Earbuds Pro × 1</div>
                <div>Smart Fitness Band × 1</div>
                <small class="text-muted">+1 more item</small>
              </div>
            </div>
            <hr class="my-3">
            <div class="d-flex justify-content-between">
              <div>
                <strong>Total:</strong> ₹8,997
              </div>
              <div>
                <a href="#" class="btn btn-sm btn-outline-primary me-2">View Details</a>
                <a href="#" class="btn btn-sm btn-outline-secondary">Track Order</a>
              </div>
            </div>
          </div>
        </div>

        <!-- More order cards... -->

        <div class="text-center mt-5">
          <button class="btn btn-outline-secondary">Load More Orders</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="py-5 bg-dark text-white">
  <!-- ... same footer ... -->
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
