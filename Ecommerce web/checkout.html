<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <!-- ... same navbar ... -->
</nav>

<div class="container py-5">
  <h2 class="mb-4">Checkout</h2>

  <div class="row">
    <!-- Left: Forms -->
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title mb-4">Shipping Address</h5>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="First Name" required></div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Last Name" required></div>
              <div class="col-12"><input type="text" class="form-control" placeholder="Address Line 1" required></div>
              <div class="col-12"><input type="text" class="form-control" placeholder="Address Line 2 (Optional)"></div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="City" required></div>
              <div class="col-md-3"><input type="text" class="form-control" placeholder="State" required></div>
              <div class="col-md-3"><input type="text" class="form-control" placeholder="PIN Code" required></div>
              <div class="col-12"><input type="tel" class="form-control" placeholder="Phone Number" required></div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="saveAddress" checked>
                  <label class="form-check-label" for="saveAddress">Save this address for future orders</label>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title mb-4">Payment Method</h5>
          <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="payment" id="razorpay" checked>
            <label class="form-check-label" for="razorpay">
              <i class="fas fa-credit-card me-2"></i>Razorpay (UPI, Cards, Wallets)
            </label>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="payment" id="cod">
            <label class="form-check-label" for="cod">
              <i class="fas fa-money-bill-wave me-2"></i>Cash on Delivery
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="payment" id="payu">
            <label class="form-check-label" for="payu">
              <i class="fas fa-wallet me-2"></i>PayU / Other
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm sticky-top" style="top:80px;">
        <div class="card-body">
          <h5 class="card-title">Order Summary</h5>
          <hr>
          <div id="checkoutItems"></div>
          <hr>
          <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span id="subtotal">₹0</span></div>
          <div class="d-flex justify-content-between mb-2"><span>Shipping</span><span id="shipping">₹0</span></div>
          <div class="d-flex justify-content-between mb-2"><span>GST (18%)</span><span id="tax">₹0</span></div>
          <hr>
          <div class="d-flex justify-content-between fw-bold fs-5"><span>Total</span><span id="total">₹0</span></div>
          <button class="btn btn-primary w-100 mt-4 py-3 fw-bold">PLACE ORDER</button>
          <p class="text-center text-muted small mt-3">By placing order you agree to our <a href="#">Terms & Conditions</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="py-5 bg-dark text-white">
  <!-- ... same footer ... -->
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

<script>
// Render cart summary in checkout
function renderCheckoutSummary() {
  const container = document.getElementById('checkoutItems');
  container.innerHTML = '';
  let subtotal = 0;

  cart.forEach(item => {
    const qty = item.quantity || 1;
    const total = item.price * qty;
    subtotal += total;

    container.innerHTML += `
      <div class="d-flex justify-content-between mb-2">
        <div>
          <strong>${item.name}</strong> × ${qty}
        </div>
        <div>₹${total.toLocaleString('en-IN')}</div>
      </div>
    `;
  });

  if (cart.length === 0) {
    container.innerHTML = '<p class="text-center text-muted py-3">No items in cart</p>';
  }

  const shipping = subtotal > 10000 ? 0 : 149;
  const tax = Math.round(subtotal * 0.18);
  const grand = subtotal + shipping + tax;

  document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString('en-IN')}`;
  document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : `₹${shipping}`;
  document.getElementById('tax').textContent = `₹${tax.toLocaleString('en-IN')}`;
  document.getElementById('total').textContent = `₹${grand.toLocaleString('en-IN')}`;
}

renderCheckoutSummary();
</script>

</body>
</html>
